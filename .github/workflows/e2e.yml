name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🛠 Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 📦 Install workspace dependencies
        run: bun install

      - name: 🎭 Install Playwright Browsers
        run: bunx playwright install --with-deps

      - name: ✅ Run E2E Tests
        run: bun run e2e
        # Playwright's webServer config boots the admin (5173) and storefront
        # (5174) Vite dev servers and waits for them — no manual start needed.

      - name: 📤 Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 7
