# Render Blueprint — deploys Ordexa as an open-source, single-database stack.
#
#   • ordexa-db        managed PostgreSQL (free)
#   • ordexa-backend   Node web service (Express API, runs on tsx)
#   • ordexa-frontend  static site (Vite/React build)
#
# Temporal and OpenTelemetry stay OFF here (their env vars are unset), so the
# backend runs the DB-durable in-process inventory saga — the only path that
# fits Render's free tier. To enable durable Temporal workflows later, host a
# Temporal server and set TEMPORAL_ADDRESS (plus run the worker), on a paid
# instance with enough memory.
databases:
  - name: ordexa-db
    plan: free

services:
  - type: web
    name: ordexa-backend
    runtime: node
    plan: free
    rootDir: apps/backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ordexa-db
          property: connectionString
      - key: NODE_ENV
        value: production

  - type: web
    name: ordexa-frontend
    runtime: static
    rootDir: apps/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Set to the deployed backend URL after the first deploy, then redeploy.
      - key: VITE_API_URL
        sync: false
